<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BluePay — Dashboard</title>
  <meta name="description" content="BluePay admin dashboard — view users, balances, and transaction history in real time." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0f1a;
      --surface:   #111827;
      --surface2:  #1a2235;
      --border:    #1f2d45;
      --accent:    #3b82f6;
      --accent2:   #60a5fa;
      --green:     #22c55e;
      --red:       #ef4444;
      --yellow:    #f59e0b;
      --text:      #f1f5f9;
      --muted:     #64748b;
      --radius:    14px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
      border-bottom: 1px solid var(--border);
      padding: 20px 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }
    .status-dot {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.8rem; color: var(--muted);
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Layout ── */
    main { max-width: 1200px; margin: 0 auto; padding: 36px 24px 0; }

    h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 18px; color: var(--text); }

    /* ── User Cards ── */
    .users-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
      margin-bottom: 40px;
    }
    .user-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      cursor: pointer;
      transition: border-color .2s, transform .2s, box-shadow .2s;
      position: relative;
      overflow: hidden;
    }
    .user-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(59,130,246,.06), transparent);
      opacity: 0;
      transition: opacity .2s;
    }
    .user-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 32px rgba(59,130,246,.15); }
    .user-card:hover::before { opacity: 1; }
    .user-card.active { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59,130,246,.3); }

    .card-avatar {
      width: 46px; height: 46px; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; font-weight: 700;
      margin-bottom: 14px;
    }
    .card-name { font-size: 1rem; font-weight: 600; }
    .card-id { font-size: 0.75rem; color: var(--muted); margin-bottom: 16px; }
    .card-balance-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
    .card-balance {
      font-size: 1.8rem; font-weight: 800;
      background: linear-gradient(90deg, var(--accent2), #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* ── Section row ── */
    .section-row {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 24px;
      align-items: start;
    }
    @media(max-width:860px){ .section-row{ grid-template-columns:1fr; } }

    /* ── Transactions panel ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .panel-header {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-header h2 { margin: 0; }
    .badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.72rem;
      padding: 3px 10px;
      color: var(--muted);
    }

    .txn-list { max-height: 440px; overflow-y: auto; }
    .txn-list::-webkit-scrollbar { width: 4px; }
    .txn-list::-webkit-scrollbar-track { background: transparent; }
    .txn-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .txn-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 22px;
      border-bottom: 1px solid var(--border);
      transition: background .15s;
      animation: fadeIn .3s ease;
    }
    @keyframes fadeIn { from{ opacity:0; transform:translateY(6px) } to{ opacity:1; transform:none } }
    .txn-item:last-child { border-bottom: none; }
    .txn-item:hover { background: var(--surface2); }

    .txn-icon {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
    }
    .txn-icon.sent     { background: rgba(239,68,68,.12);  color: var(--red);   }
    .txn-icon.received { background: rgba(34,197,94,.12);  color: var(--green); }

    .txn-info { flex: 1; min-width: 0; }
    .txn-peer { font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .txn-id   { font-size: 0.68rem; color: var(--muted); font-family: monospace; }
    .txn-time { font-size: 0.68rem; color: var(--muted); }

    .txn-amount { font-weight: 700; font-size: 0.95rem; white-space: nowrap; }
    .txn-amount.sent     { color: var(--red);   }
    .txn-amount.received { color: var(--green); }

    .empty-state {
      padding: 48px 24px;
      text-align: center;
      color: var(--muted);
    }
    .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }
    .empty-state p { font-size: 0.85rem; }

    /* ── Send Money Form ── */
    .form-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }
    .form-panel h2 { margin-bottom: 20px; }

    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .8px; }

    select, input[type="text"], input[type="number"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color .2s;
    }
    select:focus, input:focus { border-color: var(--accent); }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff;
      margin-top: 8px;
    }
    .btn-primary:hover { opacity: .9; }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      padding: 14px 20px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 500;
      max-width: 320px;
      z-index: 999;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .3s, transform .3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: none; }
    #toast.success { background: rgba(34,197,94,.15); border: 1px solid var(--green); color: var(--green); }
    #toast.error   { background: rgba(239,68,68,.15);  border: 1px solid var(--red);   color: var(--red);   }

    /* ── Refresh btn ── */
    .refresh-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: border-color .2s, color .2s;
      font-family: 'Inter', sans-serif;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent2); }

    /* ── SMS Panel ── */
    .sms-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-top: 24px;
    }
    .sms-panel h2 { margin-bottom: 6px; }
    .sms-hint { font-size: 0.75rem; color: var(--muted); margin-bottom: 16px; }
    .sms-hint code {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 0.75rem;
      color: var(--accent2);
    }
    .sms-input-row { display: flex; gap: 10px; }
    .sms-input-row input { flex: 1; }
    .btn-sms {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .2s;
    }
    .btn-sms:hover { opacity: .88; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">💳</div>
    BluePay
  </div>
  <div class="status-dot">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Connecting…</span>
  </div>
</header>

<main>

  <!-- Users -->
  <h2>👥 Users &amp; Balances</h2>
  <div class="users-grid" id="usersGrid">
    <div class="empty-state"><div class="empty-icon">⏳</div><p>Loading users…</p></div>
  </div>

  <!-- Transactions + Send Money -->
  <div class="section-row">

    <!-- Transactions -->
    <div class="panel">
      <div class="panel-header">
        <h2 id="txnTitle">📋 All Transactions</h2>
        <div style="display:flex;gap:8px;align-items:center;">
          <span class="badge" id="txnCount">0 txns</span>
          <button class="refresh-btn" onclick="refreshTxns()">↻ Refresh</button>
        </div>
      </div>
      <div class="txn-list" id="txnList">
        <div class="empty-state"><div class="empty-icon">🔍</div><p>Select a user or send a transaction</p></div>
      </div>
    </div>

    <!-- Right column: Send + SMS -->
    <div>
      <!-- Send Money -->
      <div class="form-panel">
        <h2>💸 Send Money</h2>
        <div class="form-group">
          <label for="senderSel">From</label>
          <select id="senderSel"></select>
        </div>
        <div class="form-group">
          <label for="receiverSel">To</label>
          <select id="receiverSel"></select>
        </div>
        <div class="form-group">
          <label for="amountInp">Amount (₹)</label>
          <input type="number" id="amountInp" placeholder="e.g. 250" min="1" />
        </div>
        <button class="btn btn-primary" id="sendBtn" onclick="sendMoney()">Send Payment</button>
      </div>

      <!-- SMS Simulator -->
      <div class="sms-panel">
        <h2>📱 SMS Simulator</h2>
        <p class="sms-hint">Format: <code>PAY &lt;amount&gt; &lt;senderId&gt; &lt;receiverId&gt; &lt;txn_id&gt;</code></p>
        <div class="sms-input-row">
          <input type="text" id="smsInp" placeholder="PAY 100 user1 user2 TXN001" />
          <button class="btn-sms" onclick="sendSms()">Send SMS</button>
        </div>
      </div>
    </div>
  </div>

</main>

<!-- Toast -->
<div id="toast"></div>

<script>
  const API = 'http://localhost:3005';
  let allUsers = {};
  let selectedUserId = null;

  // ── Toast ──────────────────────────────────────────────────────────────
  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.className = ''; }, 3500);
  }

  // ── Fetch helpers ───────────────────────────────────────────────────────
  async function apiFetch(path, opts = {}) {
    const r = await fetch(API + path, { headers: { 'Content-Type': 'application/json' }, ...opts });
    return r.json();
  }

  // ── Load Users ──────────────────────────────────────────────────────────
  async function loadUsers() {
    try {
      const data = await apiFetch('/users');
      allUsers = {};
      data.users.forEach(u => allUsers[u.userId] = u);
      renderUsers();
      populateSelects();
      setStatus(true);
    } catch {
      setStatus(false);
    }
  }

  function renderUsers() {
    const grid = document.getElementById('usersGrid');
    grid.innerHTML = '';
    Object.values(allUsers).forEach(u => {
      const initials = u.name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
      const card = document.createElement('div');
      card.className = 'user-card' + (selectedUserId === u.userId ? ' active' : '');
      card.id = 'card-' + u.userId;
      card.innerHTML = `
        <div class="card-avatar">${initials}</div>
        <div class="card-name">${u.name}</div>
        <div class="card-id">${u.userId}</div>
        <div class="card-balance-label">Balance</div>
        <div class="card-balance">₹${u.balance.toFixed(2)}</div>
      `;
      card.addEventListener('click', () => selectUser(u.userId));
      grid.appendChild(card);
    });
  }

  function populateSelects() {
    const users = Object.values(allUsers);
    ['senderSel','receiverSel'].forEach((id, i) => {
      const sel = document.getElementById(id);
      sel.innerHTML = users.map(u => `<option value="${u.userId}">${u.name} (₹${u.balance.toFixed(2)})</option>`).join('');
      if (i === 1 && users.length > 1) sel.selectedIndex = 1;
    });
  }

  // ── Select user for txn history ─────────────────────────────────────────
  async function selectUser(userId) {
    selectedUserId = userId;
    document.querySelectorAll('.user-card').forEach(c => c.classList.remove('active'));
    const card = document.getElementById('card-' + userId);
    if (card) card.classList.add('active');

    const name = allUsers[userId]?.name || userId;
    document.getElementById('txnTitle').textContent = `📋 ${name}'s Transactions`;

    const list = document.getElementById('txnList');
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><p>Loading…</p></div>';

    try {
      const data = await apiFetch(`/transactions/${userId}`);
      renderTxns(data.transactions, userId);
      document.getElementById('txnCount').textContent = `${data.transactions.length} txns`;
    } catch {
      toast('Failed to load transactions', 'error');
    }
  }

  async function refreshTxns() {
    await loadUsers();
    if (selectedUserId) await selectUser(selectedUserId);
    else await loadAllTxns();
  }

  async function loadAllTxns() {
    // Aggregate all transactions by fetching each user
    const userIds = Object.keys(allUsers);
    const seen = new Set();
    const combined = [];
    for (const uid of userIds) {
      try {
        const d = await apiFetch(`/transactions/${uid}`);
        d.transactions.forEach(t => {
          if (!seen.has(t.txn_id)) { seen.add(t.txn_id); combined.push(t); }
        });
      } catch {}
    }
    combined.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
    document.getElementById('txnTitle').textContent = '📋 All Transactions';
    document.getElementById('txnCount').textContent = `${combined.length} txns`;
    renderTxns(combined, null);
  }

  function renderTxns(txns, forUserId) {
    const list = document.getElementById('txnList');
    if (!txns || txns.length === 0) {
      list.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><p>No transactions yet</p></div>';
      return;
    }
    const sorted = [...txns].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
    list.innerHTML = sorted.map(t => {
      const isSent = forUserId ? t.senderId === forUserId : false;
      const cls  = forUserId ? (isSent ? 'sent' : 'received') : 'received';
      const icon = isSent ? '↑' : '↓';
      const sign = isSent ? '-' : '+';
      const peer = isSent ? t.receiverName : t.senderName;
      const label = forUserId
        ? (isSent ? `To ${t.receiverName}` : `From ${t.senderName}`)
        : `${t.senderName} → ${t.receiverName}`;
      const time = new Date(t.timestamp).toLocaleString();
      return `
        <div class="txn-item">
          <div class="txn-icon ${cls}">${icon}</div>
          <div class="txn-info">
            <div class="txn-peer">${label}</div>
            <div class="txn-id">${t.txn_id}</div>
            <div class="txn-time">${time}</div>
          </div>
          <div class="txn-amount ${cls}">${sign}₹${t.amount.toFixed(2)}</div>
        </div>`;
    }).join('');
  }

  // ── Send Money ──────────────────────────────────────────────────────────
  async function sendMoney() {
    const senderId   = document.getElementById('senderSel').value;
    const receiverId = document.getElementById('receiverSel').value;
    const amount     = parseFloat(document.getElementById('amountInp').value);

    if (senderId === receiverId) { toast('Sender and receiver must differ', 'error'); return; }
    if (!amount || amount <= 0)  { toast('Enter a valid amount', 'error'); return; }

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.textContent = 'Processing…';

    const txn_id = 'TXN-' + Date.now();
    try {
      const res = await apiFetch('/transaction', {
        method: 'POST',
        body: JSON.stringify({ txn_id, senderId, receiverId, amount }),
      });
      if (res.status === 'success') {
        toast(`✅ ₹${amount.toFixed(2)} sent successfully!`);
        document.getElementById('amountInp').value = '';
        await loadUsers();
        if (selectedUserId) await selectUser(selectedUserId);
        else await loadAllTxns();
      } else {
        toast(res.message || 'Transaction failed', 'error');
      }
    } catch {
      toast('Network error', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Send Payment';
    }
  }

  // ── SMS Simulator ───────────────────────────────────────────────────────
  async function sendSms() {
    const message = document.getElementById('smsInp').value.trim();
    if (!message) { toast('Enter an SMS message', 'error'); return; }
    try {
      const res = await apiFetch('/sms', { method: 'POST', body: JSON.stringify({ message }) });
      if (res.status === 'success') {
        toast(`📱 SMS processed — ₹${res.amount} sent`);
        document.getElementById('smsInp').value = '';
        await loadUsers();
        if (selectedUserId) await selectUser(selectedUserId);
        else await loadAllTxns();
      } else {
        toast(res.message || 'SMS failed', 'error');
      }
    } catch {
      toast('Network error', 'error');
    }
  }

  // ── Status indicator ────────────────────────────────────────────────────
  function setStatus(online) {
    const dot  = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    dot.style.background    = online ? 'var(--green)' : 'var(--red)';
    dot.style.boxShadow     = online ? '0 0 6px var(--green)' : '0 0 6px var(--red)';
    text.textContent        = online ? 'Backend online' : 'Backend offline';
  }

  // ── Boot ────────────────────────────────────────────────────────────────
  (async () => {
    await loadUsers();
    await loadAllTxns();
    // Auto-refresh every 10s
    setInterval(async () => {
      await loadUsers();
      if (selectedUserId) await selectUser(selectedUserId);
      else await loadAllTxns();
    }, 10000);
  })();
</script>
</body>
</html>
