<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BluePay — Dashboard</title>
  <meta name="description" content="BluePay admin dashboard — view users, balances, and transaction history in real time." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #030303; 
      --surface: #0A0A0A; 
      --row-hover: #171717;
      --border: rgba(255, 255, 255, 0.2); 
      
      --text-primary: #FAFAFA;
      --text-secondary: #A3A3A3;
      --text-headers: #D4D4D4;
      --text-mono: #f5f5f5;
      
      --status-approved: #10B981;
      --status-rejected: #EF4444;
      --status-pending: #F59E0B;
      
      --radius: 6px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      font-weight: 400;
      line-height: 1.6;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      height: 54px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text-primary);
    }
    .status-dot-container {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 500; color: var(--text-secondary);
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--status-pending);
    }

    /* ── Layout ── */
    main { max-width: 1200px; margin: 0 auto; padding: 32px 24px 0; }

    h2 { 
      font-size: 12px; font-weight: 600; 
      text-transform: uppercase; letter-spacing: 0.04em; 
      color: var(--text-headers); margin-bottom: 20px; 
    }

    /* ── User Cards ── */
    .users-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0;
      margin-bottom: 48px;
      border-top: 1px solid var(--border);
      border-left: 1px solid var(--border);
      background: var(--surface);
    }
    .user-card {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 24px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      transition: background 0.15s;
    }
    .user-card:hover { 
      background: var(--row-hover);
    }
    .user-card.active { background: rgba(255, 255, 255, 0.1); }

    .card-name { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
    .card-id { font-size: 12px; color: var(--text-secondary); margin-bottom: 16px; font-family: 'Inter', monospace; }
    .card-balance-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-headers); margin-bottom: 6px; font-weight: 500; }
    .card-balance { font-size: 20px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.01em; }

    /* ── Section row ── */
    .section-row { display: block; }

    /* ── Panels ── */
    .panel {
      background: var(--surface);
      margin-bottom: 24px;
    }
    
    .panel-header {
      padding: 0 24px; height: 56px;
      border-top: 1px solid var(--border);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      border-top-left-radius: var(--radius);
      border-top-right-radius: var(--radius);
      background: #111111;
    }
    .panel-header h2 { margin: 0; color: var(--text-primary); font-size: 13px; font-weight: 600; }
    
    .badge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 11px; font-weight: 500;
      padding: 0 10px;
      height: 24px;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--text-secondary);
    }
    .refresh-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: var(--radius);
      padding: 0 14px;
      height: 28px;
      font-size: 12px; font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.1s;
    }
    .refresh-btn:hover:not(:disabled) { background: var(--row-hover); color: var(--text-primary); }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Table ── */
    .table-container {
      max-height: 480px; 
      overflow-y: auto; 
    }
    .table-container::-webkit-scrollbar { width: 8px; }
    .table-container::-webkit-scrollbar-track { background: transparent; }
    .table-container::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    .table-container::-webkit-scrollbar-thumb:hover { background: #444; }

    table { 
      width: 100%; border-collapse: collapse; text-align: left; 
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
    thead { position: sticky; top: 0; z-index: 10; }
    th {
      font-size: 11px; text-transform: uppercase; color: var(--text-headers);
      font-weight: 500; letter-spacing: 0.04em; padding: 0 24px; height: 44px;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      background: #111111; white-space: nowrap;
    }
    th:last-child { border-right: none; }
    td {
      font-size: 13px; color: var(--text-primary); padding: 0 24px; height: 52px;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      transition: background 0.15s;
    }
    td:last-child { border-right: none; }
    tbody tr:hover td { background: var(--row-hover); }

    .status-badge {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 400;
      color: var(--text-primary);
    }
    .status-badge::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; }
    .status-badge.sent::before { background: var(--status-rejected); }
    .status-badge.received::before { background: var(--status-approved); }

    .empty-state {
      padding: 64px 24px; text-align: center; color: var(--text-secondary);
    }
    .empty-state p { font-size: 13px; font-weight: 400; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 32px; right: 32px;
      padding: 14px 20px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text-primary); font-size: 13px; font-weight: 500;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
      z-index: 999; opacity: 0; transform: translateY(16px);
      transition: opacity .3s ease, transform .3s ease; 
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: none; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    BluePay
  </div>
  <div class="status-dot-container">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Connecting…</span>
  </div>
</header>

<main>

  <!-- Users -->
  <h2>Users &amp; Balances</h2>
  <div class="users-grid" id="usersGrid">
    <div class="empty-state"><p>Loading users…</p></div>
  </div>

  <!-- Transactions -->
  <div class="section-row">
    <div class="panel" style="padding:0; box-shadow:none; border:none; background:transparent;">
      <div class="panel-header">
        <h2 id="txnTitle" style="margin:0; font-size:13px; letter-spacing:0; text-transform:none;">All Transactions</h2>
        <div style="display:flex;gap:12px;align-items:center;">
          <span class="badge" id="txnCount">0 txns</span>
          <button class="refresh-btn" onclick="refreshTxns()">Refresh</button>
        </div>
      </div>
      <div class="table-container">
        <table id="txnTable">
          <thead>
            <tr>
              <th>TRANSACTION</th>
              <th>DATE</th>
              <th>STATUS</th>
              <th style="text-align: right;">AMOUNT</th>
            </tr>
          </thead>
          <tbody id="txnList">
            <tr>
              <td colspan="4">
                <div class="empty-state"><p>Select a user or refresh transactions</p></div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</main>

<div id="toast"></div>

<script>
  const API = 'http://localhost:3005';
  let allUsers = {};
  let selectedUserId = null;

  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.className = ''; }, 3500);
  }

  async function apiFetch(path, opts = {}) {
    const r = await fetch(API + path, { headers: { 'Content-Type': 'application/json' }, ...opts });
    return r.json();
  }

  async function loadUsers() {
    try {
      const data = await apiFetch('/users');
      allUsers = {};
      data.users.forEach(u => allUsers[u.userId] = u);
      renderUsers();
      setStatus(true);
    } catch {
      setStatus(false);
    }
  }

  function renderUsers() {
    const grid = document.getElementById('usersGrid');
    grid.innerHTML = '';
    Object.values(allUsers).forEach(u => {
      const card = document.createElement('div');
      card.className = 'user-card' + (selectedUserId === u.userId ? ' active' : '');
      card.id = 'card-' + u.userId;
      card.innerHTML = `
        <div class="card-name">${u.name}</div>
        <div class="card-id">${u.userId}</div>
        <div style="flex:1;"></div>
        <div class="card-balance-label">Balance</div>
        <div class="card-balance">₹${u.balance.toFixed(2)}</div>
      `;
      card.addEventListener('click', () => selectUser(u.userId));
      grid.appendChild(card);
    });
  }

  async function selectUser(userId) {
    selectedUserId = userId;
    document.querySelectorAll('.user-card').forEach(c => c.classList.remove('active'));
    const card = document.getElementById('card-' + userId);
    if (card) card.classList.add('active');

    const name = allUsers[userId]?.name || userId;
    document.getElementById('txnTitle').textContent = `${name}'s Transactions`;

    const list = document.getElementById('txnList');
    list.innerHTML = '<tr><td colspan="4"><div class="empty-state"><p>Loading…</p></div></td></tr>';

    try {
      const data = await apiFetch(`/transactions/${userId}`);
      renderTxns(data.transactions, userId);
      document.getElementById('txnCount').textContent = `${data.transactions.length} txns`;
    } catch {
      toast('Failed to load transactions', 'error');
    }
  }

  async function refreshTxns() {
    const btn = document.querySelector('.refresh-btn');
    const originalText = btn.textContent;
    btn.textContent = 'Refreshing...';
    btn.disabled = true;

    try {
      await loadUsers();
      if (selectedUserId) await selectUser(selectedUserId);
      else await loadAllTxns();
      toast('Transactions refreshed', 'success');
    } catch (e) {
      toast('Failed to refresh data', 'error');
    } finally {
      btn.textContent = originalText;
      btn.disabled = false;
    }
  }

  async function loadAllTxns() {
    const userIds = Object.keys(allUsers);
    const seen = new Set();
    const combined = [];
    for (const uid of userIds) {
      try {
        const d = await apiFetch(`/transactions/${uid}`);
        d.transactions.forEach(t => {
          if (!seen.has(t.txn_id)) { seen.add(t.txn_id); combined.push(t); }
        });
      } catch {}
    }
    combined.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
    document.getElementById('txnTitle').textContent = 'All Transactions';
    document.getElementById('txnCount').textContent = `${combined.length} txns`;
    renderTxns(combined, null);
  }

  function renderTxns(txns, forUserId) {
    const list = document.getElementById('txnList');
    if (!txns || txns.length === 0) {
      list.innerHTML = '<tr><td colspan="4"><div class="empty-state"><p>No transactions yet</p></div></td></tr>';
      return;
    }
    const sorted = [...txns].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
    list.innerHTML = sorted.map(t => {
      const isSent = forUserId ? t.senderId === forUserId : false;
      const statusCls = isSent ? 'sent' : 'received';
      const statusText = 'Approved'; 
      const sign = isSent ? '-' : '+';
      const peer = isSent ? t.receiverName : t.senderName;
      const label = forUserId
        ? (isSent ? `To ${t.receiverName}` : `From ${t.senderName}`)
        : `${t.senderName} → ${t.receiverName}`;
      const time = new Date(t.timestamp).toLocaleString();
      return `
        <tr>
          <td>
            <div style="font-weight:500; color:var(--text-primary); margin-bottom:4px;">${label}</div>
            <div style="font-size:11px; color:var(--text-secondary); font-family:monospace;">${t.txn_id}</div>
          </td>
          <td style="color:var(--text-secondary);">${time}</td>
          <td>
            <div class="status-badge ${statusCls}">${statusText}</div>
          </td>
          <td style="color:var(--text-mono); font-weight:600; text-align:right;">${sign}₹${t.amount.toFixed(2)}</td>
        </tr>`;
    }).join('');
  }

  function setStatus(online) {
    const dot  = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    dot.style.background    = online ? 'var(--status-approved)' : 'var(--status-rejected)';
    text.textContent        = online ? 'Backend online' : 'Backend offline';
  }

  (async () => {
    await loadUsers();
    await loadAllTxns();
  })();
</script>
</body>
</html>
